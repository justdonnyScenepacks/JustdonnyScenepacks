<!DOCTYPE html>
<html>
<head>
    <title>Justdonny Scenepacks</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b0b0f;
            color: white;
        }

        header {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: #1a1a22;
            border-radius: 12px;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card p {
            padding: 10px;
            margin: 0;
        }

        .btn {
            display: block;
            padding: 10px;
            text-align: center;
            background: #2a2a3a;
            color: white;
            text-decoration: none;
        }

        .btn:hover {
            background: #3a3a55;
        }
    </style>
</head>

<body>

<header>Justdonny Scenepacks</header>

<div class="grid">

    <div class="card">
        <img src="JOUW-FOTO-1.jpg">
        <p>Scenepack 1</p>
        <a class="btn" href="#">Bekijk</a>
    </div>

    <div class="card">
        <img src="JOUW-FOTO-2.jpg">
        <p>Scenepack 2</p>
        <a class="btn" href="#">Bekijk</a>
    </div>

</div>

</body>
</html>
