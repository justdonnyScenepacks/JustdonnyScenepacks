<!DOCTYPE html>
<html>
<head>
    <title>Justdonny Scenepacks</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b0b0f;
            color: white;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .name {
            font-weight: bold;
            font-size: 18px;
        }

        /* CENTER */
        .center {
            text-align: center;
            margin-top: 80px;
        }

        .center h1 {
            font-size: 45px;
            margin: 0;
        }

        .center p {
            max-width: 650px;
            margin: 15px auto;
            color: #b5b5b5;
            font-size: 15px;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="left">
        <img src="logo.png" class="logo">
        <span class="name">JouwNaam</span>
    </div>
</div>

<!-- CENTER -->
<div class="center">
    <h1>JustdonnyScenepacks</h1>
    <p>A collection of high-quality Dutch scenepacks featuring films, TV series, football, and popular YouTube creators.</p>
</div>

</body>
</html>
