<!DOCTYPE html>
<html>
<head>
    <title>Justdonny Scenepacks</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: black;
            color: white;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* TOPBAR GRID */
        .topbar {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 18px 25px;
        }

        /* LEFT SIDE (LOGO + SEARCH) */
        .left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        .search-wrapper {
            position: relative;
            width: 220px;

            /* 🔥 ONLY CHANGE: iets meer naar links */
            transform: translateX(-10px);
        }

        .search-wrapper input {
            width: 100%;
            padding: 8px 35px;
            border-radius: 10px;
            border: 1px solid rgba(255,0,0,0.35);
            background: rgba(255,255,255,0.06);
            color: white;
            outline: none;
        }

        .icon-left {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* CENTER CONTENT */
        .center {
            text-align: center;
        }

        .menu {
            display: flex;
            justify-content: center;
            gap: 25px;
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
        }

        .menu a:hover {
            color: red;
        }

        .title {
            font-size: 50px;
            font-weight: 900;
        }

        .desc {
            color: #aaa;
            margin-top: 10px;
            font-size: 13px;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .filter {
            border: 1px solid rgba(255,0,0,0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
        }

        .request-btn {
            margin-top: 12px;
            background: rgba(255,0,0,0.25);
            border: 1px solid rgba(255,0,0,0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 999px;
            cursor: pointer;
        }

        /* RIGHT EMPTY BALANCE */
        .right {
            width: 100%;
        }

    </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="topbar">

    <!-- LEFT -->
    <div class="left">
        <img src="logo.png" class="logo">

        <div class="search-wrapper">
            <div class="icon-left">🔍</div>
            <input type="text" placeholder="Search...">
        </div>
    </div>

    <!-- CENTER -->
    <div class="center">

        <div class="menu">
            <a href="#">Home</a>
            <a href="#">Socials</a>
            <a href="#">About</a>
        </div>

        <div class="title">JUSTDONNYSCENEPACKS</div>

        <div class="desc">
            A collection of high-quality Dutch scenepacks featuring films, TV series, football, and popular YouTube creators.
        </div>

        <div class="filters">
            <div class="filter">🌍 All</div>
            <div class="filter">🎬 Films</div>
            <div class="filter">📺 Series</div>
            <div class="filter">▶ YouTube</div>
            <div class="filter">⚽ Football</div>
        </div>

        <button class="request-btn">Request Scenepack</button>

    </div>

    <!-- RIGHT -->
    <div class="right"></div>

</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];

for (let i = 0; i < 30; i++) {
    points.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "rgba(255,0,0,0.25)";
    ctx.shadowColor = "red";
    ctx.shadowBlur = 10;

    for (let i = 0; i < points.length; i++) {
        let p1 = points[i];

        p1.x += p1.vx;
        p1.y += p1.vy;

        if (p1.x < 0 || p1.x > canvas.width) p1.vx *= -1;
        if (p1.y < 0 || p1.y > canvas.height) p1.vy *= -1;

        for (let j = i + 1; j < points.length; j++) {
            let p2 = points[j];

            let dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);

            if (dist < 160) {
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
