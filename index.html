<!DOCTYPE html>
<html>
<head>
    <title>Justdonny Scenepacks</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: black;
            color: white;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .topbar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 18px 25px;
            position: relative;
            z-index: 5;
        }

        .logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        .menu {
            display: flex;
            gap: 25px;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
            cursor: pointer;
        }

        .menu a:hover {
            color: red;
        }

        .socials {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .socials img {
            width: 22px;
            height: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .socials img:hover {
            transform: scale(1.2);
        }

        /* PAGES */
        .page {
            display: none;
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            padding-top: 120px;
        }

        .page.active {
            display: block;
        }

        /* HERO */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .title {
            font-size: 65px;
            font-weight: 900;
        }

        .desc {
            max-width: 650px;
            margin: 15px auto;
            color: #aaa;
        }

        /* SEARCH (TERUG NAAR JOUW ORIGINELE GOEDE SIZE) */
        .search-box {
            display: flex;
            justify-content: center;
            margin-top: 25px;
        }

        .search-wrapper {
            position: relative;
            width: 420px; /* oude goede versie */
        }

        .search-wrapper input {
            width: 100%;
            padding: 14px 55px 14px 50px;
            border-radius: 10px;
            border: 1px solid rgba(255,0,0,0.35);
            background: rgba(255,255,255,0.06);
            color: white;
            outline: none;
        }

        .icon-left {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* FILTERS */
        .filters {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 18px;
        }

        .filter {
            border: 1px solid rgba(255,0,0,0.35);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter:hover {
            border: 1px solid red;
            box-shadow: 0 0 10px red;
            transform: scale(1.05);
        }

        /* SOCIALS PAGE */
        .social-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .social-card {
            width: 420px;
            padding: 16px;
            border: 1px solid rgba(255,0,0,0.3);
            border-radius: 12px;
            transition: 0.25s;
            cursor: pointer;
        }

        .social-card:hover {
            box-shadow: 0 0 18px red;
            border: 1px solid red;
            transform: scale(1.02);
        }

        .social-title {
            font-weight: 900;
            font-size: 14px;
        }

        .social-text {
            font-size: 12px;
            color: #aaa;
            margin-top: 6px;
        }

        /* ABOUT */
        .about-box {
            width: 500px;
            margin: auto;
            border: 1px solid red;
            padding: 20px;
            border-radius: 10px;
        }

        /* TRANSITION OVERLAY (CC WIDE WIPE) */
        .wipe {
            position: fixed;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: red;
            z-index: 999;
            transition: 0.6s ease;
        }

        .wipe.active {
            left: 0;
        }
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="wipe" id="wipe"></div>

<div class="topbar">
    <div><img src="logo.png" class="logo"></div>

    <div class="menu">
        <a onclick="go('home')">Home</a>
        <a onclick="go('socials')">Socials</a>
        <a onclick="go('about')">About</a>
    </div>

    <div class="socials">
        <img src="discord.png">
        <img src="tiktok.png">
        <img src="instagram.png">
        <img src="youtube.png">
        <img src="payhip.png">
    </div>
</div>

<!-- HOME -->
<div class="page active" id="home">
    <div class="hero">
        <div class="title">JUSTDONNYSCENEPACKS</div>

        <div class="desc">
            A collection of high-quality Dutch scenepacks.
        </div>

        <div class="search-box">
            <div class="search-wrapper">
                <div class="icon-left">🔍</div>
                <input type="text" placeholder="Search scenepacks...">
            </div>
        </div>

        <div class="filters">
            <div class="filter">🌍 All</div>
            <div class="filter">🎬 Films</div>
            <div class="filter">📺 Series</div>
            <div class="filter">▶ YouTube</div>
            <div class="filter">⚽ Football</div>
        </div>
    </div>
</div>

<!-- SOCIALS -->
<div class="page" id="socials">
    <div class="social-grid">

        <div class="social-card">
            <div class="social-title">DISCORD</div>
            <div class="social-text">Join my server</div>
        </div>

        <div class="social-card">
            <div class="social-title">TIKTOK</div>
            <div class="social-text">Watch my edits</div>
        </div>

        <div class="social-card">
            <div class="social-title">INSTAGRAM</div>
            <div class="social-text">Scenepacks & clips</div>
        </div>

        <div class="social-card">
            <div class="social-title">YOUTUBE</div>
            <div class="social-text">Subscribe for more</div>
        </div>

        <div class="social-card">
            <div class="social-title">PAYHIP</div>
            <div class="social-text">Buy my presets</div>
        </div>

    </div>
</div>

<!-- ABOUT -->
<div class="page" id="about">
    <div class="about-box">
        <h2>ABOUT ME</h2>
        <p>Text komt later.</p>
    </div>
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];

for (let i = 0; i < 30; i++) {
    points.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "rgba(255,0,0,0.25)";
    ctx.shadowColor = "red";
    ctx.shadowBlur = 10;

    for (let i = 0; i < points.length; i++) {
        let p1 = points[i];

        p1.x += p1.vx;
        p1.y += p1.vy;

        if (p1.x < 0 || p1.x > canvas.width) p1.vx *= -1;
        if (p1.y < 0 || p1.y > canvas.height) p1.vy *= -1;

        for (let j = i + 1; j < points.length; j++) {
            let p2 = points[j];
            let dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);

            if (dist < 160) {
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(draw);
}
draw();

/* PAGE SWITCH + WIPE */
function go(page) {
    const wipe = document.getElementById("wipe");

    wipe.classList.add("active");

    setTimeout(() => {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.getElementById(page).classList.add("active");
    }, 300);

    setTimeout(() => {
        wipe.classList.remove("active");
    }, 600);
}
</script>

</body>
</html>
