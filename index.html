<!DOCTYPE html>
<html>
<head>
    <title>Justdonny Scenepacks</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;

            /* 🎨 MOVING BACKGROUND */
            background: linear-gradient(-45deg, #0b0b0f, #141424, #0f0f1c, #1a1a2a);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 60px;   /* 👈 groter gemaakt */
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }

        .name {
            font-weight: bold;
            font-size: 20px;
        }

        /* CENTER */
        .center {
            text-align: center;
            margin-top: 80px;
        }

        .center h1 {
            font-size: 55px;
            margin: 0;
        }

        .center p {
            max-width: 650px;
            margin: 15px auto;
            color: #b5b5b5;
        }

        /* SEARCH */
        .search-box {
            margin-top: 25px;
        }

        .search-box input {
            width: 350px;
            padding: 14px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 15px;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="left">
        <img src="logo.png" class="logo">
        <span class="name">JouwNaam</span>
    </div>
</div>

<!-- CENTER -->
<div class="center">
    <h1>JustdonnyScenepacks</h1>

    <p>
        A collection of high-quality Dutch scenepacks featuring films, TV series, football, and popular YouTube creators.
    </p>

    <!-- SEARCH -->
    <div class="search-box">
        <input type="text" placeholder="Search scenepacks...">
    </div>
</div>

</body>
</html>
