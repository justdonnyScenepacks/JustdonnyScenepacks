<!DOCTYPE html>
<html>
<head>
    <title>Justdonny Scenepacks</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;
            overflow-x: hidden;

            /* 🔥 SMOOTH ANIMATED BACKGROUND (FAST + CLEAN) */
            background: linear-gradient(-45deg, #0b0b0f, #141424, #0f0f1c, #1a1a2a);
            background-size: 300% 300%;
            animation: gradientMove 6s ease infinite;
        }

        @keyframes gradientMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 80px;   /* 🔥 groter logo */
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }

        .name {
            font-weight: bold;
            font-size: 22px;
        }

        /* SOCIAL ICONS */
        .socials {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .socials img {
            width: 28px;
            height: 28px;
            cursor: pointer;
            transition: 0.2s;
        }

        .socials img:hover {
            transform: scale(1.2);
        }

        /* CENTER */
        .center {
            text-align: center;
            margin-top: 70px;
        }

        .center h1 {
            font-size: 55px;
            margin: 0;
        }

        .center p {
            max-width: 650px;
            margin: 15px auto;
            color: #b5b5b5;
        }

        /* SEARCH (sneller + cleaner) */
        .search-box {
            margin-top: 25px;
        }

        .search-box input {
            width: 360px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <!-- LEFT -->
    <div class="left">
        <img src="logo.png" class="logo">
        <span class="name">JustdonnyScenepacks</span>
    </div>

    <!-- RIGHT SOCIALS -->
    <div class="socials">

        <a href="https://discord.com" target="_blank">
            <img src="discord.png">
        </a>

        <a href="https://tiktok.com" target="_blank">
            <img src="tiktok.png">
        </a>

        <a href="https://instagram.com" target="_blank">
            <img src="instagram.png">
        </a>

        <a href="https://youtube.com" target="_blank">
            <img src="youtube.png">
        </a>

        <a href="https://payhip.com" target="_blank">
            <img src="payhip.png">
        </a>

    </div>

</div>

<!-- CENTER -->
<div class="center">
    <h1>JustdonnyScenepacks</h1>

    <p>
        A collection of high-quality Dutch scenepacks featuring films, TV series, football, and popular YouTube creators.
    </p>

    <div class="search-box">
        <input type="text" placeholder="Search scenepacks...">
    </div>
</div>

</body>
</html>
