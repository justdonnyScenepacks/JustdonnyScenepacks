<!DOCTYPE html>
<html>
<head>
    <title>Justdonny Scenepacks</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: black;
            color: white;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* TOP BAR */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 25px;
        }

        .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* 🇳🇱 BOLD + FLAG TEXT */
        .brand {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .brand span {
            font-weight: 900;
            text-shadow:
                0 0 8px red,
                0 0 8px white,
                0 0 8px blue;
        }

        /* MENU */
        .menu {
            display: flex;
            gap: 18px;
            font-size: 12px;
            font-weight: 300;
            opacity: 0.8;
        }

        .menu a {
            color: white;
            text-decoration: none;
            transition: 0.2s;
        }

        .menu a:hover {
            color: red;
        }

        /* SOCIALS */
        .socials {
            display: flex;
            gap: 12px;
        }

        .socials img {
            width: 22px;
            height: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .socials img:hover {
            transform: scale(1.2);
        }

        /* HERO */
        .hero {
            text-align: center;
            margin-top: 90px;
        }

        .hero h1 {
            font-size: 60px;
            margin: 0;
        }

        .hero p {
            max-width: 650px;
            margin: 15px auto;
            color: #aaa;
        }
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- TOP -->
<div class="topbar">

    <!-- LEFT -->
    <div class="left">
        <img src="logo.png" class="logo">

        <!-- 🇳🇱 TWO TITLES -->
        <div class="brand">
            <span>JustdonnyScenepacks</span><br>
            <span>JustdonnyScenepacks</span>
        </div>
    </div>

    <!-- MENU (ONLY 3) -->
    <div class="menu">
        <a href="#">Home</a>
        <a href="#">Socials</a>
        <a href="#">About</a>
    </div>

    <!-- RIGHT SOCIALS -->
    <div class="socials">
        <a href="#"><img src="discord.png"></a>
        <a href="#"><img src="tiktok.png"></a>
        <a href="#"><img src="instagram.png"></a>
        <a href="#"><img src="youtube.png"></a>
        <a href="#"><img src="payhip.png"></a>
    </div>

</div>

<!-- HERO -->
<div class="hero">
    <h1>JustdonnyScenepacks</h1>
    <p>A collection of high-quality Dutch scenepacks featuring films, TV series, football, and popular YouTube creators.</p>
</div>

<!-- 🔥 BETTER GLOW LINES BACKGROUND -->
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let lines = [];

for (let i = 0; i < 90; i++) {
    lines.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        len: 60 + Math.random() * 120,
        speed: 0.4 + Math.random() * 0.9
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let l of lines) {
        ctx.beginPath();

        ctx.strokeStyle = "rgba(255,0,0,0.4)";
        ctx.shadowColor = "red";
        ctx.shadowBlur = 12;

        ctx.moveTo(l.x, l.y);
        ctx.lineTo(l.x, l.y + l.len);
        ctx.stroke();

        l.y += l.speed;

        if (l.y > canvas.height) {
            l.y = -60;
            l.x = Math.random() * canvas.width;
        }
    }

    requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
