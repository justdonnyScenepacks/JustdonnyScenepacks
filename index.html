<!DOCTYPE html>
<html>
<head>
    <title>Justdonny Scenepacks</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: black;
            color: white;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* TOP BAR */
        .topbar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 18px 25px;
        }

        /* LEFT LOGO */
        .logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        /* MENU CENTER */
        .menu {
            display: flex;
            gap: 25px;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
        }

        .menu a:hover {
            color: red;
        }

        /* RIGHT EMPTY BALANCE */
        .right {
            display: flex;
            justify-content: flex-end;
        }

        /* HERO */
        .hero {
            text-align: center;
            margin-top: 90px;
        }

        .title {
            font-size: 65px;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .desc {
            max-width: 650px;
            margin: 15px auto;
            color: #aaa;
            font-size: 14px;
        }

        /* SEARCH WRAPPER */
        .search-box {
            margin-top: 25px;
            display: flex;
            justify-content: center;
        }

        .search-wrapper {
            position: relative;
            width: 400px;
        }

        /* 🔥 SEARCH INPUT (UPDATED ONLY PART) */
        .search-wrapper input {
            width: 100%;
            padding: 12px 45px;
            border-radius: 10px;
            border: 1px solid rgba(255, 0, 0, 0.4);
            outline: none;
            font-size: 14px;
            background: rgba(255,255,255,0.06);
            color: white;
            transition: 0.25s;
        }

        .search-wrapper input::placeholder {
            color: rgba(255, 0, 0, 0.7);
        }

        .search-wrapper:hover input {
            border: 1px solid red;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.5);
        }

        .search-wrapper input:focus {
            border: 1px solid red;
            box-shadow: 0 0 18px rgba(255, 0, 0, 0.8);
        }

        /* ICONS */
        .icon-left,
        .icon-right {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.6;
        }

        .icon-left {
            left: 12px;
        }

        .icon-right {
            right: 12px;
        }
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- TOP -->
<div class="topbar">

    <!-- LEFT LOGO -->
    <div>
        <img src="logo.png" class="logo">
    </div>

    <!-- MENU -->
    <div class="menu">
        <a href="#">Home</a>
        <a href="#">Socials</a>
        <a href="#">About</a>
    </div>

    <!-- RIGHT BALANCE -->
    <div class="right"></div>

</div>

<!-- HERO -->
<div class="hero">

    <div class="title">JUSTDONNYSCENEPACKS</div>

    <div class="desc">
        A collection of high-quality Dutch scenepacks featuring films, TV series, football, and popular YouTube creators.
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <div class="search-wrapper">

            <div class="icon-left">🔍</div>

            <input type="text" placeholder="Search scenepacks...">

            <div class="icon-right">↵</div>

        </div>
    </div>

</div>

</body>
</html>
