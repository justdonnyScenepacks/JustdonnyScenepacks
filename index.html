<!DOCTYPE html>
<html>
<head>
    <title>Justdonny Scenepacks</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: black;
            color: white;
            overflow: hidden;
        }

        /* 🔥 BACKGROUND CANVAS */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* TOP BAR */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 25px;
        }

        /* LEFT */
        .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
        }

        .brand {
            font-size: 14px;
            font-weight: 600;
        }

        /* MENU (FIXED + SMALL + DIFFERENT FONT STYLE) */
        .menu {
            display: flex;
            gap: 16px;
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.75;
        }

        .menu a {
            color: white;
            text-decoration: none;
            transition: 0.2s;
        }

        .menu a:hover {
            color: red;
        }

        /* RIGHT SOCIALS */
        .socials {
            display: flex;
            gap: 12px;
        }

        .socials img {
            width: 22px;
            height: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .socials img:hover {
            transform: scale(1.2);
        }

        /* HERO */
        .hero {
            text-align: center;
            margin-top: 90px;
        }

        .hero h1 {
            font-size: 60px;
            margin: 0;
        }

        .hero p {
            max-width: 650px;
            margin: 15px auto;
            color: #aaa;
        }

        /* SEARCH */
        .search input {
            width: 380px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
        }
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- TOP -->
<div class="topbar">

    <!-- LEFT -->
    <div class="left">
        <img src="logo.png" class="logo">
        <div class="brand">JustdonnyScenepacks</div>
    </div>

    <!-- MENU (NOW CORRECT) -->
    <div class="menu">
        <a href="#">Home</a>
        <a href="#">Socials</a>
        <a href="#">411+</a>
        <a href="#">Competitions</a>
        <a href="#">Contact</a>
        <a href="#">DMCA</a>
        <a href="#">About</a>
    </div>

    <!-- RIGHT -->
    <div class="socials">
        <a href="#"><img src="discord.png"></a>
        <a href="#"><img src="tiktok.png"></a>
        <a href="#"><img src="instagram.png"></a>
        <a href="#"><img src="youtube.png"></a>
        <a href="#"><img src="payhip.png"></a>
    </div>

</div>

<!-- HERO -->
<div class="hero">
    <h1>JustdonnyScenepacks</h1>
    <p>A collection of high-quality Dutch scenepacks featuring films, TV series, football, and popular YouTube creators.</p>

    <div class="search">
        <input type="text" placeholder="Search scenepacks...">
    </div>
</div>

<!-- 🔥 BETTER RED GLOW LINE BACKGROUND -->
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let lines = [];

for (let i = 0; i < 80; i++) {
    lines.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        len: 40 + Math.random() * 80,
        speed: 0.3 + Math.random() * 0.8
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let l of lines) {
        ctx.beginPath();

        // 🔥 glowing red lines
        ctx.strokeStyle = "rgba(255,0,0,0.35)";
        ctx.shadowColor = "red";
        ctx.shadowBlur = 8;

        ctx.moveTo(l.x, l.y);
        ctx.lineTo(l.x, l.y + l.len);
        ctx.stroke();

        l.y += l.speed;

        if (l.y > canvas.height) {
            l.y = -50;
            l.x = Math.random() * canvas.width;
        }
    }

    requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
