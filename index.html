<!DOCTYPE html>
<html>
<head>
    <title>Justdonny Scenepacks</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: black;
            color: white;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .topbar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 18px 25px;
        }

        .logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        .menu {
            display: flex;
            gap: 25px;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
        }

        .menu a:hover {
            color: red;
        }

        .socials {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .socials img {
            width: 22px;
            height: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .socials img:hover {
            transform: scale(1.2);
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 90px;
        }

        .title {
            font-size: 65px;
            font-weight: 900;
        }

        .desc {
            max-width: 650px;
            margin: 15px auto;
            color: #aaa;
        }

        /* ===== SEARCH FIX ===== */
        .search-box {
            display: flex;
            justify-content: center;
            margin-top: 25px;
            overflow: visible; /* FIX: glow wordt niet meer afgesneden */
        }

        .search-wrapper {
            position: relative;
            width: 500px; /* 🔥 iets langer gemaakt */
            overflow: visible; /* FIX glow */
        }

        .search-wrapper input {
            width: 100%;
            padding: 14px 55px 14px 50px;
            border-radius: 10px;
            border: 1px solid rgba(255,0,0,0.35);
            background: rgba(255,255,255,0.06);
            color: white;
            outline: none;
            transition: 0.25s ease;
        }

        .search-wrapper:hover input {
            border: 1px solid red;
            box-shadow: 0 0 14px rgba(255, 0, 0, 0.75);
        }

        .search-wrapper input:focus {
            border: 1px solid red;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.9);
        }

        .icon-left {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.7;
        }

        /* ===== FILTERS FIX ===== */
        .filters {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;

            transform: translateX(10px); /* 🔥 iets naar rechts zoals je vroeg */
        }

        .filter {
            background: transparent;
            border: 1px solid rgba(255, 0, 0, 0.35);
            color: white;
            padding: 8px 14px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s ease;
        }

        .filter:hover {
            border: 1px solid red;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.6);
            transform: scale(1.05);
        }

        .request-wrap {
            display: flex;
            justify-content: center;
            margin-top: 12px;
        }

        .request-btn {
            background: rgba(255, 0, 0, 0.25);
            border: 1px solid rgba(255, 0, 0, 0.6);
            color: white;
            padding: 10px 18px;
            border-radius: 999px;
            cursor: pointer;
        }

        .request-btn:hover {
            background: rgba(255, 0, 0, 0.4);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="topbar">
    <div><img src="logo.png" class="logo"></div>

    <div class="menu">
        <a href="#">Home</a>
        <a href="#">Socials</a>
        <a href="#">About</a>
    </div>

    <div class="socials">
        <a href="#"><img src="discord.png"></a>
        <a href="#"><img src="tiktok.png"></a>
        <a href="#"><img src="instagram.png"></a>
        <a href="#"><img src="youtube.png"></a>
        <a href="#"><img src="payhip.png"></a>
    </div>
</div>

<div class="hero">
    <div class="title">JUSTDONNYSCENEPACKS</div>

    <div class="desc">
        A collection of high-quality Dutch scenepacks featuring films, TV series, football, and popular YouTube creators.
    </div>

    <div class="search-box">
        <div class="search-wrapper">
            <div class="icon-left">🔍</div>
            <input type="text" placeholder="Search scenepacks...">
        </div>
    </div>

    <div class="filters">
        <div class="filter">🌍 All</div>
        <div class="filter">🎬 Films</div>
        <div class="filter">📺 Series</div>
        <div class="filter">▶ YouTube</div>
        <div class="filter">⚽ Football</div>
    </div>

    <div class="request-wrap">
        <button class="request-btn">Request Scenepack</button>
    </div>
</div>

</body>
</html>
