<!DOCTYPE html>
<html>
<head>
    <title>Justdonny Scenepacks</title>

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow-x: hidden;
            background: black;
        }

        /* 🔥 BACKGROUND CANVAS */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* TOP NAV */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
        }

        /* LEFT NAME */
        .brand {
            font-size: 16px; /* kleiner */
            font-weight: 600;
            margin-left: 5px; /* meer links */
        }

        .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* MENU CENTER */
        .menu {
            display: flex;
            gap: 18px;
            font-size: 13px;
            opacity: 0.8;
        }

        .menu a {
            color: white;
            text-decoration: none;
            transition: 0.2s;
        }

        .menu a:hover {
            color: red;
        }

        /* SOCIALS RIGHT */
        .socials {
            display: flex;
            gap: 12px;
            margin-right: -10px; /* meer naar rechts */
        }

        .socials img {
            width: 22px;
            height: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .socials img:hover {
            transform: scale(1.2);
        }

        /* HERO */
        .hero {
            text-align: center;
            margin-top: 80px;
        }

        .hero h1 {
            font-size: 60px;
            margin: 0;
        }

        .hero p {
            max-width: 700px;
            margin: 15px auto;
            color: #aaa;
        }

        /* SEARCH (sneller, geen lag) */
        .search {
            margin-top: 25px;
        }

        .search input {
            width: 380px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        /* PAGE FADE */
        .fade {
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- TOP -->
<div class="topbar">

    <!-- LEFT -->
    <div class="left">
        <img src="logo.png" class="logo">
        <div class="brand">JustdonnyScenepacks</div>
    </div>

    <!-- MENU -->
    <div class="menu">
        <a href="#">Home</a>
        <a href="#">Socials</a>
        <a href="#">411+</a>
        <a href="#">Competitions</a>
        <a href="#">Contact</a>
        <a href="#">DMCA</a>
        <a href="#">About</a>
    </div>

    <!-- SOCIALS -->
    <div class="socials">
        <a href="#"><img src="discord.png"></a>
        <a href="#"><img src="tiktok.png"></a>
        <a href="#"><img src="instagram.png"></a>
        <a href="#"><img src="youtube.png"></a>
        <a href="#"><img src="payhip.png"></a>
    </div>

</div>

<!-- HERO -->
<div class="hero fade">
    <h1>JustdonnyScenepacks</h1>

    <p>
        A collection of high-quality Dutch scenepacks featuring films, TV series, football, and popular YouTube creators.
    </p>

    <div class="search">
        <input type="text" placeholder="Search scenepacks...">
    </div>
</div>

<!-- 🔥 RED MOVING LINES BACKGROUND -->
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let lines = [];

for (let i = 0; i < 60; i++) {
    lines.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        length: Math.random() * 80,
        speed: 0.5 + Math.random(),
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let l of lines) {
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255,0,0,0.25)";
        ctx.moveTo(l.x, l.y);
        ctx.lineTo(l.x, l.y + l.length);
        ctx.stroke();

        l.y += l.speed;

        if (l.y > canvas.height) {
            l.y = -20;
            l.x = Math.random() * canvas.width;
        }
    }

    requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
