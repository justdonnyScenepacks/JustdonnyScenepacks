<!DOCTYPE html>
<html>
<head>
    <title>Justdonny Scenepacks</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: black;
            color: white;
            overflow: hidden;
        }

        /* 🔥 BACKGROUND */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* BELANGRIJK: achter alles */
        }

        /* TOP */
        .topbar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 18px 25px;
            position: relative;
            z-index: 2; /* BELANGRIJK: boven canvas */
        }

        /* LOGO LEFT */
        .logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        /* MENU */
        .menu {
            display: flex;
            gap: 25px;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
        }

        .menu a:hover {
            color: red;
        }

        /* SOCIALS RIGHT (FIXED VISIBILITY) */
        .socials {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            z-index: 2;
        }

        .socials img {
            width: 22px;
            height: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .socials img:hover {
            transform: scale(1.2);
        }

        /* HERO */
        .hero {
            text-align: center;
            margin-top: 90px;
        }

        .title {
            font-size: 65px;
            font-weight: 900;
        }

        .desc {
            max-width: 650px;
            margin: 15px auto;
            color: #aaa;
        }

        /* SEARCH */
        .search-box {
            display: flex;
            justify-content: center;
            margin-top: 25px;
        }

        .search-wrapper {
            position: relative;
            width: 400px;
        }

        .search-wrapper input {
            width: 100%;
            padding: 12px 50px;
            border-radius: 10px;
            border: 1px solid rgba(255,0,0,0.4);
            background: rgba(255,255,255,0.06);
            color: white;
            outline: none;
        }

        .icon-left {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.7;
        }

        /* 🔥 ENTER ICON FIX (meer naar rechts) */
        .icon-right {
    position: absolute;
    right: 12px; /* helemaal tegen de rand van input */
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.7;
}
        /* SEARCH WRAPPER */
.search-wrapper { ... }

/* INPUT STYLE */
.search-wrapper input { ... }

/* ICON LEFT */
.icon-left { ... }

/* ICON RIGHT */
.icon-right { ... }   ← hier blijft hij

/* 🔥 GLOW EFFECT (NIEUW) */
.search-wrapper input:focus { ... }
.search-wrapper:hover input { ... }
             
        }
        
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- TOP -->
<div class="topbar">

    <div>
        <img src="logo.png" class="logo">
    </div>

    <div class="menu">
        <a href="#">Home</a>
        <a href="#">Socials</a>
        <a href="#">About</a>
    </div>

    <div class="socials">
        <a href="#"><img src="discord.png"></a>
        <a href="#"><img src="tiktok.png"></a>
        <a href="#"><img src="instagram.png"></a>
        <a href="#"><img src="youtube.png"></a>
        <a href="#"><img src="payhip.png"></a>
    </div>

</div>

<!-- HERO -->
<div class="hero">
    <div class="title">JUSTDONNYSCENEPACKS</div>
    <div class="desc">A collection of high-quality Dutch scenepacks featuring films, TV series, football, and popular YouTube creators.</div>

    <div class="search-box">
        <div class="search-wrapper">
            <div class="icon-left">🔍</div>
            <input type="text" placeholder="Search scenepacks...">
            <div class="icon-right">↵</div>
        </div>
    </div>
</div>

<!-- 🔥 BACKGROUND (OLD STABLE VERSION) -->
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];

for (let i = 0; i < 30; i++) {
    points.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "rgba(255,0,0,0.25)";
    ctx.shadowColor = "red";
    ctx.shadowBlur = 10;

    for (let i = 0; i < points.length; i++) {
        let p1 = points[i];

        p1.x += p1.vx;
        p1.y += p1.vy;

        if (p1.x < 0 || p1.x > canvas.width) p1.vx *= -1;
        if (p1.y < 0 || p1.y > canvas.height) p1.vy *= -1;

        for (let j = i + 1; j < points.length; j++) {
            let p2 = points[j];

            let dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);

            if (dist < 160) {
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
