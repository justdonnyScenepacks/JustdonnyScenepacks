<!DOCTYPE html>
<html>
<head>
    <title>Justdonny Scenepacks</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: black;
            color: white;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* HEADER */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 25px;
        }

        .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 70px;   /* duidelijk groter */
            height: 70px;
            border-radius: 50%;
        }

        .brand {
            font-size: 18px;
            font-weight: 900;
        }

        /* TITLE (DUIDELIJK ANDERS) */
        .hero {
            text-align: center;
            margin-top: 90px;
        }

        .title {
            font-size: 65px;
            font-weight: 900;
        }

        .just { color: red; }
        .donny { color: white; }
        .packs { color: blue; }

        /* SEARCH (duidelijk zichtbaar) */
        .search input {
            margin-top: 20px;
            width: 400px;
            padding: 14px;
            border-radius: 10px;
            border: none;
            outline: none;
        }
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="topbar">
    <div class="left">
        <img src="logo.png" class="logo">
        <div class="brand">Justdonny</div>
    </div>
</div>

<div class="hero">
    <div class="title">
        <span class="just">Just</span>
        <span class="donny">donny</span>
        <span class="packs">Scenepacks</span>
    </div>

    <div class="search">
        <input type="text" placeholder="Search scenepacks...">
    </div>
</div>

<!-- SIMPLE RED GLOW LINES -->
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < 60; i++) {
        let x = Math.random() * canvas.width;
        let y = Math.random() * canvas.height;

        ctx.strokeStyle = "rgba(255,0,0,0.25)";
        ctx.shadowColor = "red";
        ctx.shadowBlur = 10;

        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x, y + 60);
        ctx.stroke();
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
