<!DOCTYPE html>
<html>
<head>
    <title>Justdonny Scenepacks</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: black;
            color: white;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* TOP BAR */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 25px;
        }

        .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* 🔥 SINGLE NAME */
        .brand {
            font-size: 16px;
            font-weight: 900;
        }

        /* MENU */
        .menu {
            display: flex;
            gap: 18px;
            font-size: 12px;
            opacity: 0.8;
        }

        .menu a {
            color: white;
            text-decoration: none;
        }

        .menu a:hover {
            color: red;
        }

        /* SOCIALS */
        .socials {
            display: flex;
            gap: 12px;
        }

        .socials img {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        /* HERO FADE IN */
        .hero {
            text-align: center;
            margin-top: 90px;
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* TITLE COLORS */
        .title {
            font-size: 60px;
            font-weight: 900;
            margin: 0;
        }

        .just { color: red; }
        .donny { color: white; }
        .packs { color: #2f7bff; }

        /* SEARCH BACK */
        .search {
            margin-top: 25px;
        }

        .search input {
            width: 380px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
        }
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- TOP -->
<div class="topbar">

    <div class="left">
        <img src="logo.png" class="logo">
        <div class="brand">Justdonny</div>
    </div>

    <div class="menu">
        <a href="#">Home</a>
        <a href="#">Socials</a>
        <a href="#">About</a>
    </div>

    <div class="socials">
        <a href="#"><img src="discord.png"></a>
        <a href="#"><img src="tiktok.png"></a>
        <a href="#"><img src="instagram.png"></a>
        <a href="#"><img src="youtube.png"></a>
        <a href="#"><img src="payhip.png"></a>
    </div>

</div>

<!-- HERO -->
<div class="hero">

    <!-- TITLE SPLIT COLORS -->
    <h1 class="title">
        <span class="just">Just</span>
        <span class="donny">donny</span>
        <span class="packs">Scenepacks</span>
    </h1>

    <div class="search">
        <input type="text" placeholder="Search scenepacks...">
    </div>

</div>

<!-- 🔥 BACKGROUND (POP + GLOW LINES) -->
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let lines = [];

for (let i = 0; i < 90; i++) {
    lines.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        len: 50 + Math.random() * 120,
        speed: 0.5 + Math.random(),
        opacity: Math.random()
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let l of lines) {

        // 🔥 glow red lines
        ctx.strokeStyle = `rgba(255,0,0,${l.opacity})`;
        ctx.shadowColor = "red";
        ctx.shadowBlur = 15;

        ctx.beginPath();
        ctx.moveTo(l.x, l.y);
        ctx.lineTo(l.x, l.y + l.len);
        ctx.stroke();

        l.y += l.speed;

        // 🔥 POP EFFECT (fade in when respawn)
        if (l.y > canvas.height) {
            l.y = -50;
            l.x = Math.random() * canvas.width;
            l.opacity = 0;

            setTimeout(() => {
                l.opacity = Math.random();
            }, 200);
        }
    }

    requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
