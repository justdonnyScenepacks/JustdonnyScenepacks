<!DOCTYPE html>
<html>
<head>

<title>JustDonny Scenepacks</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>

body {
    margin:0;
    background:black;
    color:white;
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
}


/* BACKGROUND */

canvas {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}



/* HEADER */

.topbar {

    display:grid;
    grid-template-columns:1fr auto 1fr;

    align-items:center;

    padding:18px 25px;

    position:relative;
    z-index:5;
}


.logo {

    width:60px;
    height:60px;

    border-radius:50%;

    cursor:pointer;

    transition:.2s;

}

.logo:hover {

    transform:scale(1.08);

}



.menu {

    display:flex;

    gap:25px;

}


.menu a {

    color:white;

    text-decoration:none;

    font-size:12px;

    letter-spacing:2px;

    opacity:.8;

}


.menu a:hover {

    color:red;

}


/* HERO */

.hero {

    text-align:center;

    position:relative;

    z-index:2;

    margin-top:30px;

}


.title {

    font-family:'Anton',sans-serif;

    font-size:80px;

    letter-spacing:6px;

    text-transform:uppercase;

    text-shadow:0 0 20px red;

}


.desc {

    color:#aaa;

    margin-top:10px;

}


/* SEARCH */

.search {

    margin:35px auto;

    width:420px;

}


.search input {

    width:100%;

    box-sizing:border-box;

    padding:15px 20px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,0,0,.4);

    border-radius:10px;

    color:white;

    outline:none;

}


.search input:focus {

    border-color:red;

    box-shadow:0 0 15px red;

}



/* PACK GRID */

.scenepacks {

    position:relative;

    z-index:2;

    display:grid;

    grid-template-columns:repeat(5,220px);

    gap:25px;

    justify-content:center;

    margin-top:40px;

    padding-bottom:50px;

}



.pack {

    width:220px;

    height:330px;

    position:relative;

    overflow:hidden;

    border-radius:20px;

    cursor:pointer;

    background:black;

    border:1px solid rgba(255,0,0,.25);

    opacity:0;

    transform:translateY(60px) scale(.95);

    transition:.5s;

}



.pack.show {

    opacity:1;

    transform:translateY(0) scale(1);

}



.pack:hover {

    transform:translateY(-10px) scale(1.04);

    border-color:red;

    box-shadow:0 0 25px red;

}



.pack img {

    width:100%;

    height:100%;

    object-fit:cover;

}



.pack::after {

    content:"";

    position:absolute;

    bottom:0;

    left:0;

    width:100%;

    height:50%;

    background:linear-gradient(
        transparent,
        rgba(0,0,0,.95)
    );

}



.pack-name {

    position:absolute;

    bottom:20px;

    width:100%;

    text-align:center;

    z-index:2;

    font-size:15px;

    font-weight:900;

    letter-spacing:2px;

    text-transform:uppercase;

    text-shadow:0 0 10px red;

}



.pack-line {

    position:absolute;

    bottom:48px;

    left:20px;

    right:20px;

    height:2px;

    background:red;

    box-shadow:0 0 10px red;

    z-index:2;

}


</style>

</head>


<body>


<canvas id="bg"></canvas>



<div class="topbar">


<div onclick="history.back()">
<img src="logo.png" class="logo">
</div>



<div class="menu">

<a href="index.html">HOME</a>
<a>SOCIALS</a>
<a>ABOUT</a>

</div>



<div></div>


</div>





<div class="hero">


<div class="title" id="club-title">
SCENEPACKS
</div>


<div class="desc">
DOWNLOAD HIGH QUALITY SCENEPACKS
</div>



<div class="search">

<input id="search" placeholder="SEARCH SCENEPACKS...">

</div>


</div>





<div class="scenepacks" id="pack-container">


</div>





<script src="scenepacks.js"></script>
<script src="pack-page.js"></script>



<script>


const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");


canvas.width=innerWidth;
canvas.height=innerHeight;


let points=[];


for(let i=0;i<30;i++){

points.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

vx:(Math.random()-.5)*.4,

vy:(Math.random()-.5)*.4

});

}



function draw(){


ctx.clearRect(0,0,canvas.width,canvas.height);


ctx.strokeStyle="rgba(255,0,0,.25)";

ctx.shadowColor="red";

ctx.shadowBlur=10;



points.forEach((p,i)=>{


p.x+=p.vx;
p.y+=p.vy;


if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;



for(let j=i+1;j<points.length;j++){


let p2=points[j];


let dist=Math.hypot(
p.x-p2.x,
p.y-p2.y
);


if(dist<160){

ctx.beginPath();

ctx.moveTo(p.x,p.y);

ctx.lineTo(p2.x,p2.y);

ctx.stroke();

}


}


});


requestAnimationFrame(draw);


}


draw();



window.onresize=()=>{

canvas.width=innerWidth;
canvas.height=innerHeight;

};


</script>



</body>
</html>
