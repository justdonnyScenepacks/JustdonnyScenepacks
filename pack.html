<!DOCTYPE html>
<html>
<head>

<title>JustDonny Scenepacks</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>

body {
    margin:0;
    background:black;
    color:white;
    font-family:'Inter', sans-serif;
    overflow-x:hidden;
}


/* HEADER */

.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}


.logo {
    width:60px;
    height:60px;
    border-radius:50%;
    cursor:pointer;
}


/* TITLE */

.hero {
    text-align:center;
    margin-top:40px;
}


.title {
    font-family:'Anton', sans-serif;
    font-size:70px;
    letter-spacing:4px;
}


.desc {
    color:#aaa;
    margin-top:10px;
}


/* SEARCH */

.search {
    margin:40px auto;
    width:400px;
}


.search input {

    width:100%;
    padding:15px;

    background:#111;

    border:1px solid rgba(255,0,0,.5);

    border-radius:10px;

    color:white;

    outline:none;
}


/* ===== NEW SCENEPACK SYSTEM ===== */

.scenepacks {
    display: grid;
    grid-template-columns: repeat(5, 220px);
    gap: 25px;
    justify-content: center;
    margin-top: 45px;
}


.pack {
    width: 220px;
    height: 330px;

    position: relative;
    overflow: hidden;

    border-radius: 20px;
    cursor: pointer;

    border: 1px solid rgba(255,0,0,0.25);
    background: black;

    opacity: 0;
    transform: translateY(60px) scale(0.95);

    transition:
        opacity .6s ease,
        transform .6s cubic-bezier(.2,.8,.2,1),
        box-shadow .3s ease;
}


.pack.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}


.pack:hover {
    transform: translateY(-10px) scale(1.04);
    border-color:red;
    box-shadow:
    0 0 25px rgba(255,0,0,.7);
}


.pack img {
    width:100%;
    height:100%;
    object-fit:cover;
}


/* bottom fade */
.pack::after {

    content:"";

    position:absolute;
    bottom:0;
    left:0;

    width:100%;
    height:45%;

    background:
    linear-gradient(
        transparent,
        rgba(0,0,0,.95)
    );
}


/* naam */
.pack-name {

    position:absolute;

    bottom:20px;
    left:0;

    width:100%;

    text-align:center;

    font-size:15px;
    font-weight:900;

    letter-spacing:2px;

    z-index:2;

    text-shadow:
    0 0 10px red;
}


/* rode lijn */

.pack-line {

    position:absolute;

    bottom:48px;

    left:20px;
    right:20px;

    height:2px;

    background:red;

    box-shadow:
    0 0 10px red;

    z-index:2;
}


</style>

</head>


<body>


<div class="topbar">

<img src="logo.png" class="logo" onclick="history.back()">

</div>


<div class="hero">

<div class="title" id="club-title">
SCENEPACKS
</div>


<div class="desc">
Download high quality scenepacks
</div>


<div class="search">

<input id="search" placeholder="Search scenepacks...">

</div>


</div>


<div class="scenepacks" id="pack-container">


</div>



<script src="scenepacks.js"></script>
<script src="pack-page.js"></script>


</body>
</html>
